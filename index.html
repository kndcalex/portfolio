<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>John Kendrick Alexander T. Cabunilas | Portfolio</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #0a0a0a;
            color: #e0e0e0;
            min-height: 100vh;
        }

        .top-nav {
            background-color: #111111;
            border-bottom: 1px solid #1f1f1f;
            padding: 0;
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            z-index: 1000;
            height: 70px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .nav-menu {
            list-style: none;
            display: flex;
            gap: 0;
        }

        .nav-menu a {
            display: block;
            color: #a0a0a0;
            text-decoration: none;
            padding: 24px 30px;
            font-size: 16px;
            font-weight: 500;
            transition: all 0.3s ease;
            position: relative;
        }

        .nav-menu a:hover {
            color: #ff6b35;
        }

        .nav-menu a.active {
            color: #ff6b35;
        }

        .nav-menu a.active::after {
            content: '';
            position: absolute;
            bottom: 0;
            left: 20%;
            width: 60%;
            height: 3px;
            background-color: #ff6b35;
            border-radius: 2px;
        }

        .hero {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            padding-top: 70px;
            text-align: center;
        }

        .profile-circle {
            width: 280px;
            height: 280px;
            border-radius: 50%;
            border: 4px solid #ff6b35;
            overflow: hidden;
            margin-bottom: 35px;
            box-shadow: 0 0 30px rgba(255, 107, 53, 0.3);
        }

        .profile-circle img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .hero h1 {
            color: #ff6b35;
            font-size: 36px;
            font-weight: 700;
            margin-bottom: 20px;
        }

        .hero p {
            color: #a0a0a0;
            font-size: 18px;
            line-height: 1.8;
            max-width: 600px;
            padding: 0 20px;
        }
    </style>
</head>
<body>

    <nav class="top-nav">
        <ul class="nav-menu">
            <li><a href="index.html" class="active">Home</a></li>
            <li><a href="about.html">About Me</a></li>
            <li><a href="techstack.html">Tech Stack</a></li>
            <li><a href="certifications.html">Certifications</a></li>
        </ul>
    </nav>

    <section class="hero">
        <div class="profile-circle">
            <img src="profile.jpg" alt="John Kendrick Alexander Cabunilas">
        </div>
        <h1>Hi, I'm John Kendrick Alexander Cabunilas</h1>
        <p>Welcome to my personal portfolio website. I am just a student who wants to achieve a life filled with adventure.</p>
    </section>

</body>
</html>
