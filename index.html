<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>John Kendrick Alexander Cabunilas | Portfolio</title>
    
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet">
    
    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    
    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Poppins', 'Segoe UI', sans-serif;
            background-color: #0a0a0a;
            color: #e0e0e0;
            min-height: 100vh;
        }

        /* Top Navigation */
        .top-nav {
            background-color: #111111;
            border-bottom: 1px solid #1f1f1f;
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            z-index: 1000;
            height: 70px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .nav-menu {
            list-style: none;
            display: flex;
            margin: 0;
            padding: 0;
        }

        .nav-menu a {
            display: block;
            color: #a0a0a0;
            text-decoration: none;
            padding: 24px 30px;
            font-size: 16px;
            font-weight: 500;
            transition: all 0.3s ease;
            position: relative;
        }

        .nav-menu a:hover {
            color: #ff6b35;
        }

        .nav-menu a.active {
            color: #ff6b35;
        }

        .nav-menu a.active::after {
            content: '';
            position: absolute;
            bottom: 0;
            left: 20%;
            width: 60%;
            height: 3px;
            background-color: #ff6b35;
            border-radius: 2px;
        }

        /* Hero Section */
        .hero {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            padding-top: 70px;
            text-align: center;
        }

        .profile-circle {
            width: 280px;
            height: 280px;
            border-radius: 50%;
            border: 4px solid #ff6b35;
            overflow: hidden;
            margin-bottom: 35px;
            box-shadow: 0 0 30px rgba(255, 107, 53, 0.3);
            transition: transform 0.3s ease;
        }

        .profile-circle:hover {
            transform: scale(1.05);
        }

        .profile-circle img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .hero h1 {
            color: #ff6b35;
            font-size: 36px;
            font-weight: 700;
            margin-bottom: 20px;
        }

        .hero p {
            color: #a0a0a0;
            font-size: 18px;
            line-height: 1.8;
            max-width: 600px;
            padding: 0 20px;
        }

        /* Responsive */
        @media (max-width: 768px) {
            .nav-menu a {
                padding: 15px 15px;
                font-size: 14px;
            }
            .profile-circle {
                width: 200px;
                height: 200px;
            }
            .hero h1 {
                font-size: 28px;
            }
            .hero p {
                font-size: 16px;
            }
        }
    </style>
</head>
<body>

    <nav class="top-nav">
        <ul class="nav-menu">
            <li><a href="index.html" class="active">Home</a></li>
            <li><a href="about.html">About Me</a></li>
            <li><a href="techstack.html">Tech Stack</a></li>
            <li><a href="certifications.html">Certifications</a></li>
        </ul>
    </nav>

    <section class="hero">
        <div class="profile-circle">
            <img src="profile.jpg" alt="John Kendrick Alexander Cabunilas">
        </div>
        <h1>Hi, I'm John Kendrick Alexander Cabunilas</h1>
        <p>Welcome to my personal portfolio website. I am thriving for successful life where I can travel withouth worrying anything.</p>
    </section>

    <!-- Bootstrap JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
