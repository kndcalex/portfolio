<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Home | John Kendrick Cabunilas</title>
  
  <!-- Google Fonts -->
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet">
  
  <!-- Font Awesome -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Poppins', 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      background-color: #0a0a0a;
      color: #e0e0e0;
      min-height: 100vh;
    }

    /* TOP NAVIGATION */
    .top-nav {
      background-color: #111111;
      border-bottom: 1px solid #1f1f1f;
      padding: 0 40px;
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      z-index: 1000;
      height: 70px;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    .nav-brand {
      display: flex;
      align-items: center;
      gap: 12px;
      text-decoration: none;
    }

    .brand-circle {
      width: 40px;
      height: 40px;
      border-radius: 50%;
      background-color: #ff6b35;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 16px;
      font-weight: 700;
      color: #ffffff;
      flex-shrink: 0;
    }

    .brand-name {
      color: #e0e0e0;
      font-size: 16px;
      font-weight: 600;
      white-space: nowrap;
    }

    .nav-menu {
      list-style: none;
      display: flex;
      margin: 0;
      padding: 0;
    }

    .nav-menu a {
      display: block;
      color: #a0a0a0;
      text-decoration: none;
      padding: 24px 20px;
      font-size: 15px;
      font-weight: 500;
      transition: all 0.3s ease;
      position: relative;
    }

    .nav-menu a:hover {
      color: #ff6b35;
    }

    .nav-menu a.active {
      color: #ff6b35;
    }

    .nav-menu a.active::after {
      content: '';
      position: absolute;
      bottom: 0;
      left: 20%;
      width: 60%;
      height: 3px;
      background-color: #ff6b35;
      border-radius: 2px;
    }

    /* HERO SECTION */
    .hero {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      padding-top: 70px;
      text-align: center;
    }

    .profile-circle {
      width: 280px;
      height: 280px;
      border-radius: 50%;
      border: 4px solid #ff6b35;
      overflow: hidden;
      margin-bottom: 35px;
      box-shadow: 0 0 30px rgba(255, 107, 53, 0.3);
      transition: transform 0.3s ease;
    }

    .profile-circle:hover {
      transform: scale(1.05);
    }

    .profile-circle img {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }

    .hero-title {
      color: #ff6b35;
      font-size: 36px;
      font-weight: 700;
      margin-bottom: 20px;
    }

    .hero-desc {
      color: #a0a0a0;
      font-size: 18px;
      line-height: 1.8;
      max-width: 600px;
      padding: 0 20px;
    }

    /* Responsive */
    @media (max-width: 768px) {
      .top-nav {
        height: auto;
        padding: 10px 20px;
      }

      .nav-menu {
        flex-wrap: wrap;
        justify-content: flex-end;
      }

      .nav-menu a {
        padding: 15px 12px;
        font-size: 13px;
      }

      .brand-name {
        font-size: 14px;
      }

      .profile-circle {
        width: 200px;
        height: 200px;
      }

      .hero-title {
        font-size: 28px;
      }

      .hero-desc {
        font-size: 16px;
      }
    }

    @media (max-width: 320px) {
      .nav-menu a {
        padding: 12px 10px;
        font-size: 12px;
      }

      .brand-name {
        display: none;
      }

      .hero-title {
        font-size: 24px;
      }
    }
  </style>
</head>
<body>

  <nav class="top-nav">
    <a href="index.html" class="nav-brand">
      <div class="brand-circle">JK</div>
      <span class="brand-name">John Kendrick Cabunilas</span>
    </a>
    <ul class="nav-menu">
      <li><a href="index.html" class="active">Home</a></li>
      <li><a href="about.html">About Me</a></li>
      <li><a href="techstack.html">Tech Stack</a></li>
      <li><a href="certifications.html">Certifications</a></li>
      <li><a href="contact.html">Contact</a></li>
    </ul>
  </nav>

  <section class="hero">
    <div class="profile-circle">
      <img src="profile.jpg" alt="John Kendrick Cabunilas">
    </div>
    <h1 class="hero-title">Hi, I'm John Kendrick Cabunilas</h1>
    <p class="hero-desc">Welcome to my personal portfolio website. I am thriving for a successful life where I can travel without worrying about anything.</p>
  </section>

</body>
</html>
