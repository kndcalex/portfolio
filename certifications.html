<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Certifications | John Kendrick Alexander Cabunilas</title>
  
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="css/style.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>

<<nav class="top-nav">
  <a href="index.html" class="nav-brand">
    <div class="brand-circle">JK</div>
    <span class="brand-name">John Kendrick Cabunilas</span>
  </a>
  <button class="hamburger" onclick="toggleMenu()" aria-label="Menu">
    <i class="fas fa-bars"></i>
  </button>
  <ul class="nav-menu" id="navMenu">
    <li><a href="index.html">Home</a></li>
    <li><a href="about.html">About Me</a></li>
    <li><a href="techstack.html">Tech Stack</a></li>
    <li><a href="certifications.html">Certifications</a></li>
    <li><a href="contact.html">Contact</a></li>
  </ul>
</nav>

  <div class="container-custom">
    <h1 class="page-title">Certifications</h1>

    <div class="cert-row">
      
      <div class="cert-item" onclick="showCert('python')">
        <div class="cert-badge-img">
          <img src="Images/python-badge.png" alt="Python Essentials 1">
        </div>
        <p class="cert-name">Python Essentials</p>
      </div>

      <div class="cert-item" onclick="showCert('networking')">
        <div class="cert-badge-img">
          <img src="Images/networking-badge.png" alt="Networking Basics">
        </div>
        <p class="cert-name">Networking Basics</p>
      </div>

      <div class="cert-item" onclick="showCert('word')">
        <div class="cert-badge-img">
          <img src="Images/word-badge.png" alt="Microsoft Word Specialist">
        </div>
        <p class="cert-name">Microsoft Word Specialist</p>
      </div>

      <div class="cert-item" onclick="showCert('excel')">
        <div class="cert-badge-img">
          <img src="Images/excel-badge.png" alt="Microsoft Excel Specialist">
        </div>
        <p class="cert-name">Microsoft Excel Specialist</p>
      </div>

      <div class="cert-item" onclick="showCert('c-essentials')">
        <div class="cert-badge-img">
          <img src="Images/c-essentials-badge.png" alt="C Essentials 1">
        </div>
        <p class="cert-name">C Essentials</p>
      </div>

    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>

  <script>
    function showCert(cert) {
      if (cert === 'python') {
        Swal.fire({
          title: 'Python Essentials 1',
          text: 'Cisco certification covering fundamental Python programming concepts.',
          confirmButtonColor: '#ff6b35',
          confirmButtonText: 'Close',
          background: '#111111',
          color: '#e0e0e0'
        });
      } else if (cert === 'networking') {
        Swal.fire({
          title: 'Networking Basics',
          text: 'Cisco certification covering fundamental networking concepts.',
          confirmButtonColor: '#ff6b35',
          confirmButtonText: 'Close',
          background: '#111111',
          color: '#e0e0e0'
        });
      } else if (cert === 'word') {
        Swal.fire({
          title: 'Microsoft Word Specialist',
          text: 'Proficient in document creation, formatting, and editing.',
          confirmButtonColor: '#ff6b35',
          confirmButtonText: 'Close',
          background: '#111111',
          color: '#e0e0e0'
        });
      } else if (cert === 'excel') {
        Swal.fire({
          title: 'Microsoft Excel Specialist',
          text: 'Skilled in spreadsheet creation, formulas, and data analysis.',
          confirmButtonColor: '#ff6b35',
          confirmButtonText: 'Close',
          background: '#111111',
          color: '#e0e0e0'
        });
      } else if (cert === 'c-essentials') {
        Swal.fire({
          title: 'C Essentials 1',
          text: 'Cisco certification covering fundamental C programming concepts.',
          confirmButtonColor: '#ff6b35',
          confirmButtonText: 'Close',
          background: '#111111',
          color: '#e0e0e0'
        });
      }
    }
  </script>

  <script>
    document.addEventListener('DOMContentLoaded', function() {
      const currentPage = window.location.pathname.split('/').pop() || 'index.html';
      const links = document.querySelectorAll('.nav-menu a');
      links.forEach(link => {
        link.classList.remove('active');
        const linkPage = link.getAttribute('href').split('/').pop();
        if (linkPage === currentPage || (currentPage === '' && linkPage === 'index.html')) {
          link.classList.add('active');
        }
      });
    });

    function toggleMenu() {
      document.getElementById('navMenu').classList.toggle('active');
    }

    document.querySelectorAll('.nav-menu a').forEach(link => {
      link.addEventListener('click', () => {
        document.getElementById('navMenu').classList.remove('active');
      });
    });
  </script>

</body>
</html>
