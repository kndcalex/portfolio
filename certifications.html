<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Certifications | John Kendrick Alexander Cabunilas</title>
  
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="css/style.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>

<nav class="top-nav">
  <a href="index.html" class="nav-brand">
    <div class="brand-circle">JK</div>
    <span class="brand-name">John Kendrick Cabunilas</span>
  </a>
  <button class="hamburger" onclick="toggleMenu()" aria-label="Menu">
    <i class="fas fa-bars"></i>
  </button>
  <ul class="nav-menu" id="navMenu">
    <li><a href="index.html">Home</a></li>
    <li><a href="about.html">About Me</a></li>
    <li><a href="techstack.html">Tech Stack</a></li>
    <li><a href="certifications.html">Certifications</a></li>
    <li><a href="contact.html">Contact</a></li>
  </ul>
</nav>

  <div class="container-custom">
    <h1 class="page-title">Certifications</h1>

    <div class="cert-row">
      
      <div class="cert-item" onclick="openCertModal('python')">
        <div class="cert-badge-img">
          <img src="Images/python1.png" alt="Python Essentials 1">
        </div>
        <p class="cert-name">Python Essentials</p>
      </div>

      <div class="cert-item" onclick="openCertModal('networking')">
        <div class="cert-badge-img">
          <img src="Images/net1.png" alt="Networking Basics">
        </div>
        <p class="cert-name">Networking Basics</p>
      </div>

      <div class="cert-item" onclick="openCertModal('word')">
        <div class="cert-badge-img">
          <img src="Images/word1.png" alt="Microsoft Word Specialist">
        </div>
        <p class="cert-name">Microsoft Word Specialist</p>
      </div>

      <div class="cert-item" onclick="openCertModal('powerpoint')">
        <div class="cert-badge-img">
          <img src="Images/ptt1.png" alt="Microsoft PowerPoint Specialist">
        </div>
        <p class="cert-name">Microsoft PowerPoint Specialist</p>
      </div>

      <div class="cert-item" onclick="openCertModal('c-essentials')">
        <div class="cert-badge-img">
          <img src="Images/c1.png" alt="C Essentials 1">
        </div>
        <p class="cert-name">C Essentials</p>
      </div>

    </div>
  </div>

  <!-- Certification Modal -->
  <div class="cert-modal" id="certModal">
    <div class="cert-modal-content">
      <button class="cert-modal-close" onclick="closeCertModal()">
        <i class="fas fa-times"></i>
      </button>
      
      <div class="cert-modal-body">
        <div class="cert-modal-badge">
          <img id="modalBadgeImg" src="" alt="">
        </div>
        
        <div class="cert-modal-info">
          <h2 id="modalTitle"></h2>
          <p class="cert-modal-issuer">Issued by <span id="modalIssuer"></span></p>
          <p class="cert-modal-date">Date issued: <span id="modalDate"></span></p>
          
          <div class="cert-modal-desc">
            <p id="modalDesc"></p>
          </div>
          
          <a id="modalVerifyLink" href="" target="_blank" class="cert-verify-btn">
            <i class="fas fa-external-link-alt"></i> Verify on Credly
          </a>
        </div>
      </div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>

  <script>
    // Certification data
    const certData = {
      'python': {
        title: 'Python Essentials 1',
        issuer: 'Cisco',
        date: 'March 03, 2026',
        desc: 'Cisco, in collaboration with OpenEDG Python Institute, verifies the earner of this badge successfully completed the Python Essentials 1 course and achieved the student level credentials. Earners have knowledge of the concepts of computer programming, the syntax and semantics of the Python language as well as demonstrate the ability to accomplish coding tasks related to the essentials of programming in the Python language and resolve implementation challenges using the Python Standard Library.',
        badgeImg: 'Images/python.jpg',
        link: 'https://www.credly.com/badges/38293d50-a3e1-48ef-a6b7-41daf8eee8b7/public_url'
      },
      'networking': {
        title: 'Networking Basics',
        issuer: 'Cisco',
        date: 'December 02, 2025',
        desc: 'Cisco verifies the earner of this badge successfully completed the Networking Basics course and achieved this student level credential. Earner has knowledge of the types of networks, how they work, how devices send and receive data, the types of network cabling, how IP addresses find information on the Internet, how transport and applications operate, and has practiced building a home wireless network. Participated in up to 13 Cisco Packet Tracer activities.',
        badgeImg: 'Images/networking.jpg',
        link: 'https://www.credly.com/badges/236fccca-de28-4a36-acf3-ca12f4d3851e/public_url'
      },
      'word': {
        title: 'Microsoft Office Specialist: Word Associate (Microsoft 365 Apps)',
        issuer: 'Microsoft',
        date: 'February 19, 2025',
        desc: 'Microsoft Word certification earners have a fundamental understanding of the Word environment and the ability to complete tasks independently. Earners demonstrated the principal features of Word by creating and editing a large project which can include professional-looking reports, multi-column newsletters, resumes, and business correspondence.',
        badgeImg: 'Images/word.jpg',
        link: 'https://www.credly.com/badges/00181945-af5d-44a3-95a6-f6ab2c98da00/public_url'
      },
      'powerpoint': {
        title: 'Microsoft Office Specialist: PowerPoint Associate (Microsoft 365 Apps)',
        issuer: 'Microsoft',
        date: 'May 15, 2025',
        desc: 'Microsoft PowerPoint certification earners have a fundamental understanding of the PowerPoint environment and demonstrate the correct application of PowerPoint. They are able to create, edit, and enhance PowerPoint presentations, including those for professional grade sales presentations, employee training, instructional materials, and kiosk slideshows.',
        badgeImg: 'Images/ppt.jpg',
        link: 'https://www.credly.com/badges/e0878de7-cccf-4a02-9dbe-917e43a133a2/public_url'
      },
      'c-essentials': {
        title: 'C Essentials 1',
        issuer: 'Cisco',
        date: 'August 02, 2025',
        desc: 'Cisco, in collaboration with OpenEDG C++ Institute, verifies the earner of this badge successfully completed the C Essentials 1 course and achieved the student level credentials. Earner should know the universal concepts of computer programming and developer tools, the fundamentals of the C language syntax and semantics, control and evaluations, data aggregates, functions, pointers, memory management, and how to write and debug simple programs using standard language infrastructure.',
        badgeImg: 'Images/C.jpg',
        link: 'https://www.credly.com/badges/02460c1f-8ef3-492a-a2bb-ee4da765244b/public_url'
      }
    };

    function openCertModal(certId) {
      const cert = certData[certId];
      if (!cert) return;
      
      document.getElementById('modalBadgeImg').src = cert.badgeImg;
      document.getElementById('modalBadgeImg').alt = cert.title;
      document.getElementById('modalTitle').textContent = cert.title;
      document.getElementById('modalIssuer').textContent = cert.issuer;
      document.getElementById('modalDate').textContent = cert.date;
      document.getElementById('modalDesc').textContent = cert.desc;
      document.getElementById('modalVerifyLink').href = cert.link;
      
      document.getElementById('certModal').classList.add('active');
      document.body.style.overflow = 'hidden';
    }

    function closeCertModal() {
      document.getElementById('certModal').classList.remove('active');
      document.body.style.overflow = '';
    }

    // Close modal when clicking outside
    document.getElementById('certModal').addEventListener('click', function(e) {
      if (e.target === this) {
        closeCertModal();
      }
    });

    // Close on Escape key
    document.addEventListener('keydown', function(e) {
      if (e.key === 'Escape') {
        closeCertModal();
      }
    });

    // Nav active highlight
    document.addEventListener('DOMContentLoaded', function() {
      const currentPage = window.location.pathname.split('/').pop() || 'index.html';
      const links = document.querySelectorAll('.nav-menu a');
      links.forEach(link => {
        link.classList.remove('active');
        const linkPage = link.getAttribute('href').split('/').pop();
        if (linkPage === currentPage || (currentPage === '' && linkPage === 'index.html')) {
          link.classList.add('active');
        }
      });
    });

    function toggleMenu() {
      document.getElementById('navMenu').classList.toggle('active');
    }

    document.querySelectorAll('.nav-menu a').forEach(link => {
      link.addEventListener('click', () => {
        document.getElementById('navMenu').classList.remove('active');
      });
    });
  </script>

</body>
</html>
