<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tech Stack | John Kendrick Alexander T. Cabunilas</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="css/style.css">
    <style>
        .nav-menu a[href="techstack.html"] {
            color: #e53e3e;
            background-color: #fff5f5;
            font-weight: 600;
        }
        .nav-menu a[href="index.html"] {
            color: #718096;
            background-color: transparent;
            font-weight: 500;
        }
        .skill-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 20px;
            margin-top: 30px;
        }
        .skill-card {
            background: #ffffff;
            padding: 25px;
            border-radius: 15px;
            border: 1px solid #e2e8f0;
            transition: all 0.3s;
        }
        .skill-card:hover {
            border-color: #e53e3e;
            transform: translateY(-5px);
        }
        .skill-card h3 {
            color: #e53e3e;
            margin-bottom: 15px;
            font-size: 18px;
        }
        .skill-card ul {
            list-style: none;
            color: #718096;
        }
        .skill-card li {
            padding: 5px 0;
        }
    </style>
</head>
<body>

    <aside class="sidebar">
        <div class="logo">Portfolio</div>
        <ul class="nav-menu">
            <li><a href="index.html"><i class="fas fa-home"></i> Home</a></li>
            <li><a href="about.html"><i class="fas fa-user"></i> About</a></li>
            <li><a href="techstack.html" class="active"><i class="fas fa-code"></i> Tech Stack</a></li>
            <li><a href="certifications.html"><i class="fas fa-certificate"></i> Certifications</a></li>
        </ul>
    </aside>

    <div class="corner-accent"></div>
    <div class="corner-accent-bottom"></div>

    <main class="main-content">
        <div class="content-left" style="max-width: 700px;">
            <h1 class="headline">My Tech <span class="highlight">Stack</span></h1>
            
            <div class="skill-grid">
                <div class="skill-card">
                    <h3><i class="fas fa-file-word"></i> Microsoft Office</h3>
                    <ul>
                        <li>Microsoft Word</li>
                        <li>Microsoft PowerPoint</li>
                    </ul>
                </div>
                <div class="skill-card">
                    <h3><i class="fas fa-globe"></i> Web Development</h3>
                    <ul>
                        <li>HTML5</li>
                        <li>CSS3</li>
                    </ul>
                </div>
                <div class="skill-card">
                    <h3><i class="fas fa-laptop-code"></i> Programming</h3>
                    <ul>
                        <li>Java</li>
                        <li>Python</li>
                    </ul>
                </div>
                <div class="skill-card">
                    <h3><i class="fas fa-rocket"></i> More Coming Soon</h3>
                    <ul>
                        <li>Continuously learning...</li>
                    </ul>
                </div>
            </div>
        </div>
    </main>

</body>
</html>
