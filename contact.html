<head>

  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="css/style.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>

<<nav class="top-nav">
  <a href="index.html" class="nav-brand">
    <div class="brand-circle">JK</div>
    <span class="brand-name">John Kendrick Cabunilas</span>
  </a>
  <button class="hamburger" onclick="toggleMenu()" aria-label="Menu">
    <i class="fas fa-bars"></i>
  </button>
  <ul class="nav-menu" id="navMenu">
    <li><a href="index.html">Home</a></li>
    <li><a href="about.html">About Me</a></li>
    <li><a href="techstack.html">Tech Stack</a></li>
    <li><a href="certifications.html">Certifications</a></li>
    <li><a href="contact.html">Contact</a></li>
  </ul>
</nav>

  <section class="contact-section">
    <h1 class="page-title">Get In Touch</h1>
    <h2 class="page-subtitle">Let's connect and collaborate</h2>

    <div class="social-container">
      <a href="https://www.linkedin.com/in/john-kendrick-58949b3a8" target="_blank" class="social-card linkedin">
        <i class="fab fa-linkedin"></i>
        <h3>LinkedIn</h3>
      </a>

      <a href="https://github.com/kndcalex" target="_blank" class="social-card github">
        <i class="fab fa-github"></i>
        <h3>GitHub</h3>
      </a>
    </div>

    <div class="email-box">
      <i class="fas fa-envelope"></i>
      <span>Open to opportunities and collaborations</span>
    </div>
  </section>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>

  <script>
    document.addEventListener('DOMContentLoaded', function() {
      const currentPage = window.location.pathname.split('/').pop() || 'index.html';
      const links = document.querySelectorAll('.nav-menu a');
      links.forEach(link => {
        link.classList.remove('active');
        const linkPage = link.getAttribute('href').split('/').pop();
        if (linkPage === currentPage || (currentPage === '' && linkPage === 'index.html')) {
          link.classList.add('active');
        }
      });
    });

    function toggleMenu() {
      document.getElementById('navMenu').classList.toggle('active');
    }

    document.querySelectorAll('.nav-menu a').forEach(link => {
      link.addEventListener('click', () => {
        document.getElementById('navMenu').classList.remove('active');
      });
    });
  </script>

</body>
</html>
